name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: rag_db
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag_user -d rag_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://rag_user:rag_password@localhost:5432/rag_db
      OPENAI_API_KEY: test-key
      ADMIN_API_KEYS: admin-key
      USER_API_KEYS: user-key:user-1:default
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall app tests evals
      - run: python -m pytest
      - run: alembic upgrade head
      - run: python evals/run_eval.py --dataset evals/golden_qa.example.jsonl

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

